server.port=8080
spring.application.name=api-gateway

# Student Service route
spring.cloud.gateway.routes[0].id=student-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/students/**

# Fee Service route
spring.cloud.gateway.routes[1].id=fee-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/fees/**

# Optional: Enable debug logging for gateway
logging.level.org.springframework.cloud.gateway=DEBUG